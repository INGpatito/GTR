name: Deploy to Orange Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
    env:
      ORANGE_PI_APP_DIR: ${{ secrets.ORANGE_PI_APP_DIR || vars.ORANGE_PI_APP_DIR }}
      ORANGE_PI_SERVICE_NAME: ${{ secrets.ORANGE_PI_SERVICE_NAME || vars.ORANGE_PI_SERVICE_NAME }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Validate deployment configuration
        shell: bash
        run: |
          set -e

          if [ -z "$ORANGE_PI_APP_DIR" ]; then
            echo "ERROR: falta ORANGE_PI_APP_DIR (secret o variable)."
            exit 1
          fi

      - name: Update repository in app directory
        shell: bash
        run: |
          set -e
          if [ ! -d "$ORANGE_PI_APP_DIR/.git" ]; then
            mkdir -p "$ORANGE_PI_APP_DIR"
            git clone "https://github.com/${{ github.repository }}.git" "$ORANGE_PI_APP_DIR"
          fi

          cd "$ORANGE_PI_APP_DIR"
          git fetch origin main
          git reset --hard origin/main

      - name: Run post-deploy script (optional)
        shell: bash
        run: |
          set -e
          if [ -f "$ORANGE_PI_APP_DIR/deploy.sh" ]; then
            chmod +x "$ORANGE_PI_APP_DIR/deploy.sh"
            cd "$ORANGE_PI_APP_DIR"
            ./deploy.sh
          fi

      - name: Restart systemd service (optional)
        if: env.ORANGE_PI_SERVICE_NAME != ''
        shell: bash
        run: |
          set -e
          sudo systemctl restart "$ORANGE_PI_SERVICE_NAME"

      - name: Notify Telegram on failure
        if: ${{ failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        shell: bash
        run: |
          set -e
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="Deploy fallido en ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0AActor: ${{ github.actor }}%0ARun: $RUN_URL"

          curl -sS -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHAT_ID" \
            -d "text=$MSG"

      - name: Notify Telegram on success
        if: ${{ success() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        shell: bash
        run: |
          set -e
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="Deploy exitoso en ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0AActor: ${{ github.actor }}%0ARun: $RUN_URL"

          curl -sS -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHAT_ID" \
            -d "text=$MSG"
