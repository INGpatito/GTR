name: Deploy to Orange Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
    env:
      ORANGE_PI_APP_DIR: ${{ secrets.ORANGE_PI_APP_DIR || vars.ORANGE_PI_APP_DIR }}
      ORANGE_PI_SERVICE_NAME: ${{ secrets.ORANGE_PI_SERVICE_NAME || vars.ORANGE_PI_SERVICE_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -e

          if [ -z "$ORANGE_PI_APP_DIR" ]; then
            echo "ERROR: falta ORANGE_PI_APP_DIR (secret o variable)."
            exit 1
          fi

      - name: Sync files to app directory
        shell: bash
        run: |
          set -e
          mkdir -p "$ORANGE_PI_APP_DIR"
          rsync -av --delete --exclude ".git" ./ "$ORANGE_PI_APP_DIR/"

      - name: Run post-deploy script (optional)
        shell: bash
        run: |
          set -e
          if [ -f "$ORANGE_PI_APP_DIR/deploy.sh" ]; then
            chmod +x "$ORANGE_PI_APP_DIR/deploy.sh"
            cd "$ORANGE_PI_APP_DIR"
            ./deploy.sh
          fi

      - name: Restart systemd service (optional)
        if: env.ORANGE_PI_SERVICE_NAME != ''
        shell: bash
        run: |
          set -e
          sudo systemctl restart "$ORANGE_PI_SERVICE_NAME"
